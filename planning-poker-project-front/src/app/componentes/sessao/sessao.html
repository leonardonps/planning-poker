<header>
    <h1>Planning Poker</h1>
    <nav id="barra-navegacao">
        <ul>
            <li class="item navegacao">
                <button type="button" id="botao-convidar-equipe" class="botao-primario" (click)="copiarSessaoLink()">Convidar sua equipe</button>
            </li>
        </ul>
    </nav>
</header>
<section id="sessao-principal">
    <div class="usuarios">
        @for(usuario of this.usuarios(); track $index; let i = $index) {
             <div class="usuario">
                 <div class="usuario-estimativa"[class.dada]="usuario.estimativa !== null"><strong>?</strong></div>
                 <div class="usuario-nome"><strong>{{ usuario.nome }}</strong></div>
             </div>
        }
    </div>
    <div id="mesa">
        @if (this.estimativasUsuarios().length > 0) {
            <button>Estimar</button>
        } @else {
            <p>Pelo menos, um usuário precisa colocar sua estimativa</p>
        }
    </div>
</section>
<section id="sessao-estimativas">
    @for(opcao of this.opcoesEstimativa(); track $index) {              
        <button type="button" [class.selecionada]="opcao === this.opcaoSelecionada" class="opcao-estimativa" (click)="selecionarOpcao(opcao)">{{ opcao }}</button>    
    }
</section>
<ng-container #toast></ng-container>
<ng-container #modal></ng-container>
