<app-modal-base
[titulo]="this.titulo">
    <form>
        <fieldset id="fieldset-usuario-nome">
            <label for="usuario-nome">Nome</label>
            <input type="text" id="usuario-nome" placeholder="Nome">
        </fieldset>
        <fieldset id="fieldset-observador">
            <label for="observador">É apenas um observador?</label>
            <input type="checkbox" id="observador">
        </fieldset>
    </form>
</app-modal-base>
